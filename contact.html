<h1>Contact me</h1>

<noscript>This section works best with <coding-language>JavaScript</coding-language> enabled</noscript>

<main>
    <legend>Send me an inquiry</legend>
    <form>
        <fieldset>
            <label for="name">Name</label><input type="text" id="name" name="name" required> 
            <label for="inquiry">Inquiry: </label><textarea id="inquiry" name="inquiry" rows="6" cols="60" required></textarea>
            <button type="submit">Send
                <svg width="50" height="20" xmlns="http://www.w3.org/2000/svg">
                    <line 
                        x1="10" 
                        y1="10" 
                        x2="35" 
                        y2="10"
                        stroke="black" 
                        stroke-width="2"/>

                    <polygon 
                        points="35,5 45,10 35,15"
                        fill="black"/>
                </svg>
            </button>
        </fieldset>
    </form>
</main>

<dialog>
    <p>Inquiry sent! Thank you for visiting!</p>
    <button>Close</button>
</dialog>
